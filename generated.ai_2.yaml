esphome:
  name: esp32_device
  friendly_name: ESP32 Device

esp32:
  board: esp32dev
  framework:
    type: arduino

# 基础日志输出
logger:

# 启用原生 API
api:

# 启用 OTA 远程更新
ota:

# WiFi 配置
wifi:
  ssid: "你的WiFi名称"
  password: "你的WiFi密码"
  ap:
    ssid: "ESP32 Fallback Hotspot"
    password: "12345678"

# Web 配置门户（可选）
captive_portal:

# 本地 Web 服务器（可选）
web_server:
  port: 80

# 设备状态指示
binary_sensor:
  - platform: status
    name: "设备在线状态"